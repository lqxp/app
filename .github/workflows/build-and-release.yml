name: Build And Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  QXP_RUNTIME_CONFIG_URL: ${{ secrets.QXP_RUNTIME_CONFIG_URL }}
  QXP_SERVER_ORIGIN: ${{ secrets.QXP_SERVER_ORIGIN }}
  QXP_API_BASE_URL: ${{ secrets.QXP_API_BASE_URL }}
  QXP_WS_URL: ${{ secrets.QXP_WS_URL }}
  QXP_TURN_URLS: ${{ secrets.QXP_TURN_URLS }}
  QXP_TURN_USERNAME: ${{ secrets.QXP_TURN_USERNAME }}
  QXP_RELAY_ONLY: ${{ secrets.QXP_RELAY_ONLY }}
  QXP_CALLS_ENABLED: ${{ secrets.QXP_CALLS_ENABLED }}
  QXP_CALLS_UNAVAILABLE_REASON: ${{ secrets.QXP_CALLS_UNAVAILABLE_REASON }}
  QXP_TURN_CREDENTIAL: ${{ secrets.QXP_TURN_CREDENTIAL }}

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')"
          if [ "$APP_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

  build-tauri:
    name: Build ${{ matrix.platform_name }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux-x64
            runner: ubuntu-22.04
            rust_targets: ''
            args: --bundles appimage,deb,rpm
            release_files: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform_name: Linux-arm64
            runner: ubuntu-24.04-arm
            rust_targets: ''
            args: --bundles appimage,deb,rpm
            release_files: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - platform_name: Windows-x64
            runner: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi
            release_files: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          - platform_name: Windows-arm64
            runner: windows-latest
            rust_targets: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles msi
            release_files: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
          - platform_name: macOS
            runner: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
            release_files: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Verify Rust toolchain binaries
        shell: bash
        run: |
          set -euo pipefail
          rustup show active-toolchain
          command -v cargo
          cargo --version
          command -v rustc
          rustc --version

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target # adjust if your Tauri dir differs

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform_name, 'Linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            wget \
            file \
            curl \
            libxdo-dev \
            xdg-utils

      - name: Build desktop bundle
        shell: bash
        env:
          QXP_RUNTIME_CONFIG_URL: ${{ env.QXP_RUNTIME_CONFIG_URL }}
          QXP_SERVER_ORIGIN: ${{ env.QXP_SERVER_ORIGIN }}
          QXP_API_BASE_URL: ${{ env.QXP_API_BASE_URL }}
          QXP_WS_URL: ${{ env.QXP_WS_URL }}
          QXP_TURN_URLS: ${{ env.QXP_TURN_URLS }}
          QXP_TURN_USERNAME: ${{ env.QXP_TURN_USERNAME }}
          QXP_TURN_CREDENTIAL: ${{ env.QXP_TURN_CREDENTIAL }}
          QXP_RELAY_ONLY: ${{ env.QXP_RELAY_ONLY }}
          QXP_CALLS_ENABLED: ${{ env.QXP_CALLS_ENABLED }}
          QXP_CALLS_UNAVAILABLE_REASON: ${{ env.QXP_CALLS_UNAVAILABLE_REASON }}
        run: |
          chmod +x scripts/build-tauri-ci.sh
          scripts/build-tauri-ci.sh ${{ matrix.args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qxchat-${{ matrix.platform_name }}
          if-no-files-found: error
          path: ${{ matrix.release_files }}

      - name: Trigger Nix pnpm hash update
        if: matrix.platform_name == 'Linux-x64'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-npm-deps-hash.yml --ref main

  build-android:
    name: Build Android APK
    needs: prepare-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Android signing
        shell: bash
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ]; then
            echo "::error::Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS."
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/lqxp-release-key.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          } >> "$GITHUB_ENV"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android APK
        shell: bash
        env:
          QXP_RUNTIME_CONFIG_URL: ${{ env.QXP_RUNTIME_CONFIG_URL }}
          QXP_SERVER_ORIGIN: ${{ env.QXP_SERVER_ORIGIN }}
          QXP_API_BASE_URL: ${{ env.QXP_API_BASE_URL }}
          QXP_WS_URL: ${{ env.QXP_WS_URL }}
          QXP_TURN_URLS: ${{ env.QXP_TURN_URLS }}
          QXP_TURN_USERNAME: ${{ env.QXP_TURN_USERNAME }}
          QXP_TURN_CREDENTIAL: ${{ env.QXP_TURN_CREDENTIAL }}
          QXP_RELAY_ONLY: ${{ env.QXP_RELAY_ONLY }}
          QXP_CALLS_ENABLED: ${{ env.QXP_CALLS_ENABLED }}
          QXP_CALLS_UNAVAILABLE_REASON: ${{ env.QXP_CALLS_UNAVAILABLE_REASON }}
          EXPECTED_API_BASE_URL: https://qxch.at
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
        run: |
          chmod +x scripts/build-android-ci.sh
          nix develop --command env APP_VERSION="$APP_VERSION" EXPECTED_API_BASE_URL="$EXPECTED_API_BASE_URL" QXP_RUNTIME_CONFIG_URL="$QXP_RUNTIME_CONFIG_URL" QXP_SERVER_ORIGIN="$QXP_SERVER_ORIGIN" QXP_API_BASE_URL="$QXP_API_BASE_URL" QXP_WS_URL="$QXP_WS_URL" QXP_TURN_URLS="$QXP_TURN_URLS" QXP_TURN_USERNAME="$QXP_TURN_USERNAME" QXP_TURN_CREDENTIAL="$QXP_TURN_CREDENTIAL" QXP_RELAY_ONLY="$QXP_RELAY_ONLY" QXP_CALLS_ENABLED="$QXP_CALLS_ENABLED" QXP_CALLS_UNAVAILABLE_REASON="$QXP_CALLS_UNAVAILABLE_REASON" scripts/build-android-ci.sh

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qxchat-android
          if-no-files-found: error
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk

  publish-release:
    name: Publish Release
    needs:
      - prepare-release
      - build-tauri
      - build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: qxchat-*
          path: release-assets
          merge-multiple: true

      - name: Publish release with all assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
          APP_VERSION: ${{ needs.prepare-release.outputs.app_version }}
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          set -euo pipefail

          mapfile -d '' release_files < <(find release-assets -type f -print0 | sort -z)
          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "::error::No release assets found."
            exit 1
          fi

          msi_x86=""
          while IFS= read -r -d '' file; do
            if [[ "$file" == *.msi && "$file" != *arm64* && "$file" != *aarch64* ]]; then
              msi_x86="$file"
              break
            fi
          done < <(find release-assets -type f -name '*.msi' -print0 | sort -z)

          if [ -z "$msi_x86" ]; then
            echo "::error::No MSI_x86 asset found for VirusTotal analysis."
            exit 1
          fi

          if [ -z "${VIRUSTOTAL_API_KEY:-}" ]; then
            echo "::error::Missing VIRUSTOTAL_API_KEY secret."
            exit 1
          fi

          upload_url=$(curl --fail --silent --show-error \
            --request GET \
            --url https://www.virustotal.com/api/v3/files/upload_url \
            --header "x-apikey: ${VIRUSTOTAL_API_KEY}" \
            | jq -r '.data')

          if [ -z "$upload_url" ] || [ "$upload_url" = "null" ]; then
            echo "::error::VirusTotal upload URL was not returned."
            exit 1
          fi

          analysis_id=$(curl --fail --silent --show-error \
            --request POST \
            --url "$upload_url" \
            --header "x-apikey: ${VIRUSTOTAL_API_KEY}" \
            --form "file=@${msi_x86}" \
            | jq -r '.data.id')

          if [ -z "$analysis_id" ] || [ "$analysis_id" = "null" ]; then
            echo "::error::VirusTotal analysis ID was not returned."
            exit 1
          fi

          virustotal_url="https://www.virustotal.com/gui/file-analysis/${analysis_id}"
          release_notes=$'Legitimacy is supremacy.\n'"${virustotal_url}"

          gh release create "$TAG_NAME" "${release_files[@]}" \
            --draft \
            --title "QxChat v${APP_VERSION}" \
            --notes "$release_notes"
          gh release edit "$TAG_NAME" --draft=false --latest

